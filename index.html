<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpertJourneys</title>

<style>
:root{
--brown:#5C3A21;
--beige:#F5EFE6;
--gold:#C9A227;
--white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:var(--beige);
color:var(--brown);
}

/* ===== HEADER ===== */
header{
position:sticky;
top:0;
background:var(--brown);
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
z-index:1000;
}

.logo{color:var(--gold);font-weight:bold;font-size:18px}

/* mobile menu */
.menu-btn{
display:none;
cursor:pointer;
font-size:22px;
}

nav{
display:flex;
gap:15px;
}

nav a{
color:white;
text-decoration:none;
font-size:13px;
cursor:pointer;
}

nav a:hover{color:var(--gold)}

/* ===== PAGES ===== */
.page{display:none;padding:40px 20px;}
.active{display:block}

/* ===== HERO ===== */
.hero{
text-align:center;
padding:90px 20px;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
color:white;
border-radius:0 0 20px 20px;
}

.hero h1{font-size:38px}

/* ===== SEARCH ===== */
.search{
max-width:500px;
margin:20px auto;
display:flex;
}

.search input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1100px;
margin:auto;
}

/* ===== CARD ===== */
.card{
background:white;
padding:20px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:var(--gold);
color:white;
}

/* ===== PROFILE ===== */
.profile{
background:white;
padding:25px;
border-radius:15px;
max-width:800px;
margin:auto;
}

/* ===== DASHBOARD ===== */
.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
max-width:900px;
margin:auto;
}

.box{
background:white;
padding:20px;
border-radius:12px;
}

/* ===== MODAL ===== */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:90%;
max-width:350px;
border-radius:12px;
}

/* ===== BUTTON ===== */
.btn{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
width:100%;
}

.primary{background:var(--gold);color:white}
.secondary{background:var(--brown);color:white}

/* ===== MOBILE ===== */
@media(max-width:700px){
nav{display:none;flex-direction:column;background:var(--brown);position:absolute;top:60px;right:0;width:200px;padding:10px;}
nav.show{display:flex}
.menu-btn{display:block}
}
</style>
</head>

<body>

<header>
<div class="logo">ExpertJourneys</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav id="nav">
<a onclick="show('home')">Home</a>
<a onclick="show('experts')">Experts</a>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="openLogin()">Login</a>
</nav>
</header>

<!-- HOME -->
<div id="home" class="page active">

<div class="hero">
<h1>Elevating Travel Through Expertise</h1>
<p>Book trusted tourism professionals worldwide</p>
</div>

<div class="search">
<input id="search" placeholder="Search experts..." oninput="filterExperts()">
</div>

<div class="grid" id="expertGrid"></div>
</div>

<!-- EXPERTS -->
<div id="experts" class="page">
<h2 style="text-align:center">Featured Experts</h2>
<div class="grid" id="expertGrid2"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<div class="profile" id="profileBox"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2 style="text-align:center">Dashboard</h2>

<div class="dashboard">
<div class="box">
<h3>My Bookings</h3>
<p id="bookings">No bookings yet</p>
</div>

<div class="box">
<h3>Profile Views</h3>
<p>1,204 views</p>
</div>
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="login">
<div class="modal-content">
<h3>Login</h3>
<input placeholder="Email">
<input placeholder="Password" type="password">
<button class="btn primary">Login</button>
<button class="btn secondary" onclick="closeLogin()">Close</button>
</div>
</div>

<script>

const experts = [
{
name:"John Safari",
role:"Tour Guide",
rating:"4.9",
desc:"Professional safari guide in Botswana & Kenya",
img:"https://images.unsplash.com/photo-1542038784456-1ea8e935640e"
},
{
name:"Amina Chef",
role:"Local Chef",
rating:"4.8",
desc:"Authentic African culinary experiences",
img:"https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba"
}
];

function render(){
const grid = document.getElementById("expertGrid");
const grid2 = document.getElementById("expertGrid2");

grid.innerHTML = "";
grid2.innerHTML = "";

experts.forEach((e,i)=>{
const card = `
<div class="card" onclick="openProfile(${i})">
<h3>${e.name}</h3>
<p>${e.role} ⭐ ${e.rating}</p>
</div>`;
grid.innerHTML += card;
grid2.innerHTML += card;
});
}

function show(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

function openProfile(i){
const e = experts[i];
document.getElementById("profileBox").innerHTML = `
<img src="${e.img}" style="width:100%;border-radius:12px">
<h2>${e.name}</h2>
<p>${e.desc}</p>

<h3>Reviews</h3>
<p>⭐ Amazing experience</p>
<p>⭐ Highly recommended</p>

<button class="btn primary" onclick="book('${e.name}')">Book Now</button>
`;

show('profile');
}

function book(name){
localStorage.setItem("booking", name);
document.getElementById("bookings").innerText = "Booked: " + name;
alert("Booking confirmed for " + name);
}

function filterExperts(){
let value = document.getElementById("search").value.toLowerCase();
let filtered = experts.filter(e=>e.name.toLowerCase().includes(value));

document.getElementById("expertGrid").innerHTML =
filtered.map((e,i)=>`
<div class="card" onclick="openProfile(${i})">
<h3>${e.name}</h3>
<p>${e.role}</p>
</div>`).join("");
}

function toggleMenu(){
document.getElementById("nav").classList.toggle("show");
}

function openLogin(){
document.getElementById("login").style.display="flex";
}

function closeLogin(){
document.getElementById("login").style.display="none";
}

render();
</script>

</body>
</html>
