<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ExpertJourneys Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --brown:#5C3A21;
  --light:#F5EFE6;
  --gold:#C9A227;
  --white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:var(--light);}

nav{
  background:var(--brown);
  color:white;
  display:flex;
  justify-content:space-between;
  padding:15px;
  align-items:center;
  flex-wrap:wrap;
}

nav a{
  color:white;
  margin:5px;
  text-decoration:none;
  cursor:pointer;
}

nav a:hover{color:var(--gold);}

.page{display:none;padding:20px;}
.active{display:block;}

.hero{
  background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
  height:70vh;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.btn{
  background:var(--brown);
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

.btn:hover{background:var(--gold);}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{width:100%;height:160px;object-fit:cover;}
.card-content{padding:10px;}

input{
  padding:10px;
  width:100%;
  margin:5px 0;
}
</style>
</head>

<body>

<nav>
  <h2>ExpertJourneys</h2>
  <div>
    <a onclick="go('home')">Home</a>
    <a onclick="go('explore')">Explore</a>
    <a onclick="go('experts')">Experts</a>
    <a onclick="go('bookings')">Bookings</a>
    <a onclick="go('login')">Login</a>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">

  <div class="hero">
    <h1>Elevating Travel Through Expertise 🌍</h1>
    <button class="btn" onclick="go('explore')">Start Exploring</button>
  </div>

  <h2 style="padding:20px;">Featured Experts</h2>

  <div class="grid" id="featured"></div>

</div>

<!-- EXPLORE -->
<div id="explore" class="page">

  <h2>Explore Experts</h2>

  <input id="search" placeholder="Search experts..." onkeyup="renderExperts()">

  <div class="grid" id="exploreGrid"></div>

</div>

<!-- EXPERT PAGE -->
<div id="experts" class="page">

  <h2>Expert Profile</h2>
  <div id="profile"></div>

</div>

<!-- BOOKINGS -->
<div id="bookings" class="page">

  <h2>Your Bookings</h2>
  <div id="bookingList"></div>

</div>

<!-- LOGIN -->
<div id="login" class="page">

  <h2>Login System</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="btn" onclick="login()">Login</button>

  <p id="loginMsg"></p>

</div>

<script>

/* ---------------- FAKE DATABASE ---------------- */

let user = null;

const experts = [
{
id:1,
name:"Safari Guide Botswana",
type:"Tour Guide",
img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
desc:"Wildlife expert with 10+ years experience"
},
{
id:2,
name:"Luxury Travel Chef",
type:"Chef",
img:"https://images.unsplash.com/photo-1551218808-94e220e084d2",
desc:"Fine dining travel experiences"
},
{
id:3,
name:"Travel Consultant",
type:"Agent",
img:"https://images.unsplash.com/photo-1502920917128-1aa500764cbd",
desc:"Global travel planning specialist"
}
];

let bookings = [];

/* ---------------- NAVIGATION ---------------- */

function go(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');

if(page==="home") renderFeatured();
if(page==="explore") renderExperts();
if(page==="bookings") renderBookings();
}

/* ---------------- HOME ---------------- */

function renderFeatured(){
let box = document.getElementById("featured");
box.innerHTML="";
experts.forEach(e=>{
box.innerHTML += card(e);
});
}

/* ---------------- EXPLORE ---------------- */

function renderExperts(){
let box = document.getElementById("exploreGrid");
let q = document.getElementById("search")?.value?.toLowerCase() || "";

box.innerHTML="";

experts
.filter(e=>e.name.toLowerCase().includes(q))
.forEach(e=>{
box.innerHTML += card(e,true);
});
}

/* ---------------- CARD ---------------- */

function card(e,book=false){
return `
<div class="card">
<img src="${e.img}">
<div class="card-content">
<h3>${e.name}</h3>
<p>${e.desc}</p>

${book ? `<button class="btn" onclick="book(${e.id})">Book</button>` : ""}
<button class="btn" onclick="view(${e.id})">View</button>

</div>
</div>
`;
}

/* ---------------- PROFILE ---------------- */

function view(id){
let e = experts.find(x=>x.id===id);

document.getElementById("profile").innerHTML=`
<div class="card">
<img src="${e.img}">
<div class="card-content">
<h2>${e.name}</h2>
<p>${e.desc}</p>

<button class="btn" onclick="book(${e.id})">Book Now</button>
</div>
</div>
`;

go("experts");
}

/* ---------------- BOOKING SYSTEM ---------------- */

function book(id){

if(!user){
alert("Please login first");
go("login");
return;
}

let e = experts.find(x=>x.id===id);
bookings.push(e);

alert("Booked: " + e.name);
}

/* ---------------- BOOKINGS ---------------- */

function renderBookings(){
let box = document.getElementById("bookingList");
box.innerHTML="";

if(bookings.length===0){
box.innerHTML="<p>No bookings yet</p>";
return;
}

bookings.forEach(b=>{
box.innerHTML+=`
<div class="card">
<div class="card-content">
<h3>${b.name}</h3>
<p>${b.desc}</p>
</div>
</div>
`;
});
}

/* ---------------- LOGIN ---------------- */

function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

if(email && pass){
user = {email};
document.getElementById("loginMsg").innerText="Logged in as "+email;
go("home");
}else{
document.getElementById("loginMsg").innerText="Fill all fields";
}
}

/* INIT */
renderFeatured();

</script>

</body>
</html>
