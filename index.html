<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ExpertJourneys</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5efe6}
nav{background:#5C3A21;color:white;padding:15px;display:flex;justify-content:space-between;flex-wrap:wrap}
nav button{background:#C9A227;border:none;color:white;padding:8px;margin:3px;cursor:pointer}
.page{display:none;padding:20px}
.active{display:block}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px}
input,textarea{width:100%;padding:10px;margin:5px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
</style>
</head>

<body>

<nav>
<div>🌍 ExpertJourneys</div>
<div>
<button onclick="go('home')">Home</button>
<button onclick="go('explore')">Explore</button>
<button onclick="go('dashboard')">Dashboard</button>
<button onclick="go('bookings')">Bookings</button>
<button onclick="go('messages')">Messages</button>
<button onclick="logout()">Logout</button>
</div>
</nav>

<!-- 🔐 HOME -->
<div id="home" class="page active">
<h2>Login / Signup</h2>
<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>
</div>

<!-- 🏡 EXPLORE -->
<div id="explore" class="page">
<h2>Explore Experts</h2>
<div id="listings" class="grid"></div>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard" class="page">
<h2>Dashboard</h2>

<div class="card">
<h3>Create Listing (Experts)</h3>
<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="location" placeholder="Location">
<button onclick="createListing()">Add Listing</button>
</div>

<div id="myListings"></div>
</div>

<!-- 📅 BOOKINGS -->
<div id="bookings" class="page">
<h2>Bookings</h2>
<div id="bookingsBox"></div>
</div>

<!-- 💬 MESSAGES -->
<div id="messages" class="page">
<h2>Messages</h2>

<div id="chat" class="card" style="height:200px;overflow:auto"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>
</div>

<script>

// 🔥 FIREBASE (PUT YOUR CONFIG HERE)
const firebaseConfig = {
 apiKey:"YOUR_KEY",
 authDomain:"YOUR_DOMAIN",
 projectId:"YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user=null;

// 🌍 NAVIGATION SYSTEM (FAKE PAGES)
function go(page){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(page).classList.add('active');
}

// 🔐 AUTH
function signup(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
}

function login(){
 auth.signInWithEmailAndPassword(email.value,password.value)
}

function logout(){
 auth.signOut();
 location.reload();
}

// 👤 USER STATE
auth.onAuthStateChanged(u=>{
 if(u){
   user=u;
   go('explore');
   loadListings();
   loadBookings();
   loadMessages();
 }
});

// 🏡 LISTINGS
function createListing(){
 db.collection("listings").add({
   title:title.value,
   price:price.value,
   location:location.value,
   owner:user.uid
 });
}

function loadListings(){
 db.collection("listings").onSnapshot(snap=>{
 let html="";
 snap.forEach(d=>{
   let x=d.data();
   html+=`
   <div class="card">
     <h3>${x.title}</h3>
     <p>${x.location}</p>
     <b>${x.price}</b>
     <button onclick="book('${d.id}')">Book</button>
   </div>`;
 });
 listings.innerHTML=html;
 });
}

// 📅 BOOKINGS
function book(id){
 db.collection("bookings").add({
   listingId:id,
   user:user.uid,
   status:"pending"
 });
}

function loadBookings(){
 db.collection("bookings").onSnapshot(snap=>{
 let html="";
 snap.forEach(d=>{
   html+=`<div class="card">${d.data().status}</div>`;
 });
 bookingsBox.innerHTML=html;
 });
}

// 💬 MESSAGES
function sendMsg(){
 db.collection("messages").add({
   text:msg.value,
   time:Date.now()
 });
 msg.value="";
}

function loadMessages(){
 db.collection("messages")
 .orderBy("time")
 .onSnapshot(snap=>{
 let html="";
 snap.forEach(d=>{
   html+=`<p>${d.data().text}</p>`;
 });
 chat.innerHTML=html;
 });
}

</script>

</body>
</html>
